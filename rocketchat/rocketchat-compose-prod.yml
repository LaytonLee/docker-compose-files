version: '3'

volumes:
  mongodb_data:
    driver: local

services:
  rocketchat:
    image: rocketchat/rocket.chat:${ROCKETCHAT_WEB_VERSION}
    container_name: rocketchat-server
    restart: unless-stopped
    volumes:
      - ${PERSIST_VOLUME}/rocketchat/uploads:/app/uploads
    environment:
      PORT: 3000
      ROOT_URL: https://${ROCKETCHAT_WEB_DOMAIN}
      MONGO_URL: 'mongodb://${MONGODB_USERNAME}:${MONGODB_PASSWORD}@mongodb:27017/${MONGODB_DATABASE}?authSource=${MONGODB_DATABASE}&replicaSet=rs0'
      MONGO_OPLOG_URL: 'mongodb://${MONGODB_OPLOG_USER}:${MONGODB_OPLOG_PASSWORD}@mongodb:27017/local?authSource=admin&replicaSet=rs0'
      USE_NATIVE_OPLOG: 'true'
    depends_on:
      - mongodb
    expose:
      - 3000
    ports:
      - "${ROCKETCHAT_BIND_IP}:${ROCKETCHAT_WEB_PORT}:3000"

  mongodb:
    image: bitnami/mongodb:${MONGODB_VERSION}
    container_name: rocketchat-db
    restart: always
    environment:
      MONGODB_REPLICA_SET_MODE: primary
      MONGODB_REPLICA_SET_NAME: rs0
      MONGODB_PORT_NUMBER: 27017
      MONGODB_INITIAL_PRIMARY_HOST: 'mongodb'
      MONGODB_INITIAL_PRIMARY_PORT_NUMBER: 27017
      MONGODB_ADVERTISED_HOSTNAME: mongodb
      MONGODB_ENABLE_JOURNAL: 'true'
      MONGODB_REPLICA_SET_KEY: '${MONGODB_REPLICA_SET_KEY}'
      MONGODB_ROOT_PASSWORD: '${MONGODB_ROOT_PASSWORD}'
      MONGODB_DATABASE: '${MONGODB_ROCKETCHAT_DATABASE}'
      MONGODB_USERNAME: '${MONGODB_ROCKETCHAT_USERNAME}'
      MONGODB_PASSWORD: '${MONGODB_ROCKETCHAT_PASSWORD}'
      MONGODB_OPLOG_USER: '${MONGODB_OPLOG_USER}'
      MONGODB_OPLOG_PASSWORD: '${MONGODB_OPLOG_PASSWORD}'
    volumes:
      - 'mongodb_data:/bitnami/mongodb'
      - ./init.d/oplog_user.sh:/docker-entrypoint-initdb.d/oplog_user.sh:ro